data:
  definition:
  - content: For a given class of emission, the minimum value of the occupied bandwidth
      sufficient to ensure the transmission of information at the rate and with the
      quality required for the system employed, under specified conditions. Emission
      useful for the good functioning of the receiving equipment as, for example,
      the emission corresponding to the carrier of reduced carrier systems, shall
      be included in the necessary bandwidth.
