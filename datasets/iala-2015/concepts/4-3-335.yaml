data:
  definition:
  - content: A pulse of duration less than the period of a recurrent phenomenon, used
      for scrutinizing a particular epoch of that phenomenon.
  examples: []
  notes:
  - content: In radar, a strobe pulse is sometimes made to follow automatically the
      echo from a moving object.
