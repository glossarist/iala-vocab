data:
  definition:
  - content: |-
      1. The process of providing light {{2-1-005, Light (2)}}, either to be.viewed directly or to illuminate objects and their surroundings so that they may be seen.

      2. An ensemble of lights.

      Similarly a distinction is made between an ensemble of lights to be viewed directly (Befeuerung) and an ensemble of lights illuminating objects and their surroundings to be viewed (Beleuchtung).
  examples: []
  notes:
  - content: In the latter case the term Illumination may also be applied.
  - content: A distinction is made in German between the process of providing light
      to be viewed directly (Befeuern) and the process of illuminating objects and
      their surroundings to be viewed (Beleuchten, equivalent to English "illumination").
