data:
  definition:
  - content: The colour quality of a colour stimulus definable by its chromaticity
      co-ordinates, or by its dominant (or complementary) wavelength and its purity
      taken together.
  examples: []
  notes:
  - content: 'For definitions relating to Purity see Reference: C.I.E.'
