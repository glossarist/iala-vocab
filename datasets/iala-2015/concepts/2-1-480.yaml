  definition:
  - content: |-
      The ratio of each of the three tristimulus values to their sum.

      C.I.E. 1931) x, y, z.
  examples: []
  notes:
  - content: 'See the Note: to 2-1-475. For a field of vision of about 10 degrees
      the symbols are x10, y10, z10'
