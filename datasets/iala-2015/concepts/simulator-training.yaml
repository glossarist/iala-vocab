data:
  definition:
  - content: |-
      urn:mrn:iala:dic:0901032e

      Simulator Training is the simulation of operational events, practices and procedures to instruct trainees and assess their ability to demonstrate their levels of competence.

      Source: IALA Recommendation V-103
      to
      IALA Guideline G1156 Recruitment, training and assessment of VTS Personnel
