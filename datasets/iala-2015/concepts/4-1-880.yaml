data:
  definition:
  - content: Change in the direction of propagation of a radiation, determined by
      the change in the velocity of propagation in passing through a non-homogeneous
      medium, or in passing from one medium to another.
  examples: []
  notes:
  - content: This phenomenon appears only when the angle of incidence is different
      from 90 degrees .
