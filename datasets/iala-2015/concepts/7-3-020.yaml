data:
  definition:
  - content: Steel with a carbon content between about 0.15 and 0.25 %. By decreasing
      the carbon content greater ductility is obtained at the expense of strength.
  examples: []
  notes:
  - content: Heat treatments may be used to improve selected characteristics of the
      material.
