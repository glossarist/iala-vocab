data:
  definition:
  - content: |-
      A fixed artificial navigation mark that can be recognised by its shape, colour, pattern, topmark or light character, or a combination of these.

      It may carry various additional aids to navigation.
  examples: []
  notes:
  - content: This term is not commonly used when the navigation mark can be classified
      as a lighthouse.
  - content: The terms light, light beacon and lighted beacon refer to a beacon that
      carries a signal light.
  - content: The terms unlighted beacon and unlit beacon refer to a beacon that does
      not carry a signal light.
  sources:
