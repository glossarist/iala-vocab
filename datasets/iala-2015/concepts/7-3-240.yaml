data:
  definition:
  - content: A construction method for reinforced concrete in which a tension is imparted
      to the main longitudinal reinforcement to help reduce tensile forces in the
      concrete.
  examples: []
  notes:
  - content: Prestressing may be effected by tensioning the reinforcement before pouring
      the concrete, the resultant being called prestressed concrete. Alternatively
      prestressing may be effected by tensioning the reinforcement within ducts in
      precast components and subsequently pressure grouting to form an integral structure,
      the resultant being called post-tensioned concrete.
