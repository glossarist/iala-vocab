data:
  definition:
  - content: |-
      The ratio of the radiant flux at wavelength ?m to that at wavelength ?, such that both radiations produce equally intense luminous sensations under specified photometric conditions, and ?m is chosen so that the maximum value of this ratio is equal to 1.

      Unless otherwise indicated, the values used for the spectral luminous efficiency relate to photopic vision by the normal eye having the characteristics laid down by the
  examples: []
  notes:
  - content: 'The complete definition given by the Reference: C.I.E. includes a table
      of spectral luminous efficiency, V(?), against wavelength for the photometric
      standard observer for photopic vision. A similar table relating to spectral
      luminous efficiency for scotopic vision, V''(?), is also given by the Reference:
      C.I.E.'
