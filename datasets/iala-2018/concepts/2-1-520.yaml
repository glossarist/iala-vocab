data:
  definition:
  - content: The thermal radiator which absorbs completely all incident radiation,
      whatever the wavelength, the direction of incidence or the polarisation. This
      radiator has, for any wavelength, the maximum spectral concentration of radiant
      exitance at a given temperature.
