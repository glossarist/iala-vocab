data:
  definition:
  - content: An aid to navigation station founded on or close to the coast, emitting
      signals that can provide navigational information to vessels in the vicinity.
  examples: []
  notes:
  - content: The station may also be defined in terms of its principal aid to navigation,
      e.g. light station, fog signal station.
