data:
  definition:
  - content: |-
      Re-establishment of what occurred or what existed in the past, on the basis of documentary or physical evidence.

      (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
