data:
  definition:
  - content: Perceived colour Aspect of visual perception by which an observer may
      distinguish differences between two fields of view of the same size, shape and
      structure, such as may be caused by differences in the spectral composition
      of the radiation concerned in the observation.
  - content: Psychophysical colour Characteristic of a visible radiation by which
      an observer may distinguish differences between two fields of view of the same
      size, shape and structure, such as may be caused by differences in the spectral
      composition of the radiation concerned in the observation.
