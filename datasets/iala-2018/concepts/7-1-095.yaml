data:
  definition:
  - content: A floating and moored object intended as an aid to navigation or to be
      used for mooring vessels. It may carry additional aids to navigation.
  examples: []
  notes:
  - content: The terms light buoy and lighted buoy refer to a buoy that is fitted
      with a signal light.
  - content: The terms unlighted buoy and blind buoy refer to a buoy that has no signal
      light.
  - content: A buoy used for mooring a vessel is called a mooring buoy. The French
      term is coffre d'amarrage.
  sources:
