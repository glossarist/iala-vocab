data:
  definition:
  - content: |-
      A type of mirror, particularly used in projectors, the reflecting surface of which is a paraboloid of revolution. Light rays emitted by a point source placed at the focus of the paraboloid are rendered parallel to the optical axis {{2-2-110, Optical Axis}} after reflection.

      ![Ch2_Fig12.jpg](/iala-vocab/images/iala/Ch2_Fig12.jpg)
