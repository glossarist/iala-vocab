data:
  definition:
  - content: A structure extending into the water approximately perpendicular to a
      shore or a bank and providing berthing for ships, and which may also provide
      cargo-handling facilities.
  examples: []
  notes:
  - content: A pier or jetty providing cargo-handling facilities may also be called
      a wharf.
  - content: In French the term mole is also sometimes used in place of the term "brise-lames",
      for a breakwater {{1-2-250, Breakwater}} when it protects the entrance of a
      harbour.
