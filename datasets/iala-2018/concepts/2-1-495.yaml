data:
  definition:
  - content: The temperature of the full radiator for which the ordinates of the spectral
      distribution curve of its radiance are proportional, or approximately so, in
      the visible region, to those of the distribution curve of the radiation considered.
  examples: []
  notes:
  - content: Both radiations will necessarily have the same, or nearly the same, chromaticity.
  sources:
  - origin:
      ref:
        source: IALA Dictionary
