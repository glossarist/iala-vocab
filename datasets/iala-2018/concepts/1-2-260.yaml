data:
  definition:
  - content: Construction along the coast or banks of a river or lake, for protection
      against flooding.
  examples: []
  notes:
  - content: In Britain a dike on the sea is called a sea-wall.
  - content: In France, the word digue is sometimes used in place of the word "jetee"
      when the construction protects an area of water within a harbour.
