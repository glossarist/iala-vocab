data:
  definition:
  - content: In the most general sense, the process by which the propagation of electromagnetic
      waves is modified by lack of homogeneity in the medium.
  - content: More usually the process by which the propagation of electromagnetic
      waves is modified by one or more discontinuities in the medium of limited extent
      compared with the wavelength.
