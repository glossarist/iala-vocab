data:
  definition:
  - content: An engine in which the combustion of a fuel or fuel-air mixture takes
      place in an enclosed chamber, producing the power stroke directly, and in which
      the products of combustion form the working medium. Petrol, diesel and gas engines
      are internal combustion engines.
