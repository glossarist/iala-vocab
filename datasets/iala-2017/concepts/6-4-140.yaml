data:
  definition:
  - content: A machine designed so that the ingress of solid foreign bodies of specified
      sizes and the harmful ingress of water are restricted or prevented.
  examples: []
  notes:
  - content: The different categories for protection of machines are specified in
      IEC 34-5. For further details of these, See Section 8.
