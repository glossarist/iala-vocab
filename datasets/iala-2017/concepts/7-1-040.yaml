data:
  definition:
  - content: A construction of earth faced with masonry or other material along a
      coast or bank, to permit berthing for vessels, usually with cargo-handling facilities.
  examples: []
  notes:
  - content: A jetty or quay with cargo handling facilities is called a wharf.
