data:
  definition:
  - content: Equipment used with discharge lamps for stabilizing the discharge.
  examples: []
  notes:
  - content: A ballast may be resistive, inductive, capacitive, or a combination of
      these.
  - content: The ballast may also be used, either alone or in combination with a starter,
      to light the lamp. The starter may be incorporated in the ballast.
