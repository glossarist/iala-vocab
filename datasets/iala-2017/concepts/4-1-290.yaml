data:
  definition:
  - content: |-
      Electric field intensity (deprecated)

      The magnitude of the electric field vector. The term usually refers to the root-mean-square value of the field.
  examples: []
  notes:
  - content: This term is sometimes called Electric field intensity but such use of
      the word intensity is deprecated in favour of Field strength since intensity
      connotes power in optics and radiation.
