data:
  definition:
  - content: |-
      A form of fan beam {{2-1-090, Luminous fan beam}} produced by diverging a pencil beam {{2-1-095, Luminous Pencil Beam}} in a plane containing the axis of the beam (usually either horizontally or vertically) so that the angle of divergence of the diverged beam is greater than that of the original beam.

