data:
  definition:
  - content: A d.c. motor with a permanent magnet field in which the formerless armature
      winding rotates about a stationary soft iron core. The rotor inertia is then
      that of the windings and commutator only and the speed is sufficiently proportional
      to the applied voltage to permit the motor being used as an integrator.
