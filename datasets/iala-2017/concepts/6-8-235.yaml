data:
  definition:
  - content: An enclosure (or machine) designed to restrict or prevent the ingress
      of liquids or solid particles in harmful quantities, or solid extraneous objects
      of specified size.
  examples: []
  notes:
  - content: See also 6-4-140.
  - content: The different categories of protection are specified for enclosures in
      IEC 529, and for machines in IEC 34-5.
