data:
  definition:
  - content: For a specified direction of incidence and a specified ratio of the amplitudes
      of the vertically and horizontally polarized components of the incident wave,
      the maximum value of the polarization error with respect to variation of the
      phase difference between these components.
  examples: []
  notes:
  - content: The term is applicable only to direction finders designed for operation
      with either vertically polarized waves or horizontally polarized waves.
