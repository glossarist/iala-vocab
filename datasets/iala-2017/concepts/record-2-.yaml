data:
  definition:
  - content: |-
      The description, depiction and analysis of any feature or area using drawings, survey, photographs and any other suitable means as well as the preservation of documents, photographs and other material relating to the feature or area in any earlier condition or use.

      (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
