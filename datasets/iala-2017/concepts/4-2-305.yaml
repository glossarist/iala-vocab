data:
  definition:
  - content: The deviation of a ray from the great circle plane containing the point
      of observation and the transmitter.
  examples: []
  notes:
  - content: Such deviation can occur, for example, as a result of reflection from
      a tilted ionospheric layer, by reflection from a mountain or cliff or by coastal
      refraction.
