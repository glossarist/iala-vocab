data:
  definition:
  - content: Usually, 1 troland produces a retinal illuminance of approximately 2
      x 10-3 lumen per square metre.
  examples: []
  notes:
  - content: 'For the correction factors which must be taken into account in computing
      the retinal illuminance, see Reference: C.I.E.'
  sources:
  - origin:
      ref:
        source: IALA Dictionary
    type: authoritative
  - origin:
      ref:
        source: C.I.E. (extract)
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: Troland
  language_code: eng
  annotations:
  - content: Unit used for expressing the magnitude of the external light stimulus
      applied to the eye. When the eye is viewing a surface of uniform luminance,
      the number of trolands is equal to the product of the area in square millimetres
      of the limiting pupil, natural or artificial, and the luminance of the surface
      in candelas per square metre.
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Troland
