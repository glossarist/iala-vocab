data:
  definition:
  - content: The wavelength of the monochromatic light stimulus that, when combined
      in suitable proportions with the specified achromatic light stimulus, yields
      a match with the colour stimulus considered.
  examples: []
  notes:
  - content: When the dominant wavelength cannot be given (this applies to purples)
      its place is taken by the complementary wavelength.
  - content: 'For the definitions of Achromatic and Specified Achromatic Light Stimulus,
      see Reference: C.I.E. In particular, for surface colours, the light source serving
      as illuminant is taken as achromatic.'
