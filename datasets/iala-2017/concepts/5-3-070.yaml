data:
  definition:
  - content: Modulation in which the time of occurrence of some characteristic of
      a pulse carrier is varied from the unmodulated value.
  examples: []
  notes:
  - content: This is a general term which includes several forms of modulation such
      as pulse duration, pulse position and pulse interval modulation.
