data:
  definition:
  - content: A wave that is propagated over the earth and is ordinarily affected by
      the presence of the ground and the troposphere. The ground wave includes all
      components of a radio wave over the earth except ionospheric and tropospheric
      waves.
  examples: []
  notes:
  - content: The ground wave is refracted because of variations in the dielectric
      constant of the troposphere including the condition known as the surface duct.
