data:
  definition:
  - content: |-
      stone pitching

      Stones used to form a protective covering to an earth embankment or river banks to prevent scour and erosion.
  examples: []
  notes:
  - content: The French term enrochements and the German term Steinschuttung also
      apply to stones used to provide a protective mound or embankment.
