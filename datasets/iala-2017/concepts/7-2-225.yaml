data:
  definition:
  - content: A vertical load-bearing member designed to resist compression and buckling.
  examples: []
  notes:
  - content: A column is made of concrete or masonry.
  - content: A stanchion is made of iron or steel.
  - content: A pillar is made of stone or cast iron, and is usually of circular cross
      section.
