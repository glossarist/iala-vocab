---
data:
  definition:
  - content: |-
      A measure of the effectiveness with which gross errors may be detected.

      This internal reliability is usually expressed in terms of marginally detectable bias (MDB).

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
