data:
  definition:
  - content: |-
      A direction light {{2-5-235, Direction Light}} bounded by other sectors of different character which define its margins with small angles of uncertainty.

      Most commonly the bounding sectors are of different colours (red and green). (Fig.46b)

      ![Ch2_Fig46b.jpg](/iala-vocab/images/iala/Ch2_Fig46b.jpg)
