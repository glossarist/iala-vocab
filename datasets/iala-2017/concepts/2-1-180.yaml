data:
  definition:
  - content: |-
      Regular transmission and diffuse transmission occurring simultaneously. (Fig. 8c)

      ![Ch2_Fig8.jpg](/iala-vocab/images/iala/Ch2_Fig8.jpg)
  examples: []
  notes:
  - content: |-
      The luminance received from a point source after regular transmission varies inversely as the square of the distance between the source and the point at which the illuminance is produced.
      That received after diffuse transmission varies inversely as the square of the distance to the diffuser.
