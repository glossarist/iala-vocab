data:
  definition:
  - content: |-
      (Wet) Dock

      Harbour or basin which is closed against the tidal range and which provides cargo-handling facilities for ships.
  examples: []
  notes:
  - content: In the U.S.A. the space between two piers which is not closed against
      the tidal range is also called a dock.
