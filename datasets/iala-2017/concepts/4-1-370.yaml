data:
  definition:
  - content: |-
      Alternative terms: (Antenna) Power gain, (Antenna) Radiation pattern

      A curve representing, in polar or cartesian co-ordinates, a quantity proportional to the gain of an antenna in the various directions in a particular plane or cone.
