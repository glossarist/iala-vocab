data:
  definition:
  - content: A range of frequencies occupied by the spectral components resulting
      from the modulation of a carrier wave by a signal.
  - content: A discrete frequency in a sideband (properly called a side frequency).
  examples: []
  notes:
  - content: The terms upper sideband and lower sideband are used to denote the ranges
      higher than or lower than the carrier frequency respectively.
