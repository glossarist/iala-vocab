data:
  definition:
  - content: |-
      A stepped profile such that a light ray emitted from the focus and passing through a portion of the profile exhibits equal angles of incidence and emergence. This produces minimum dispersion.

      ![Ch2_Fig15.jpg](/iala-vocab/images/iala/Ch2_Fig15.jpg)
