data:
  definition:
  - content: |-
      (Computer) Programme (G.B.)

      A set of instructions in the proper form to cause a computer to perform any desired computation
  examples: []
  notes:
  - content: When the computation is a repetitive task, e.g., sine(x), it is called
      a routine.
