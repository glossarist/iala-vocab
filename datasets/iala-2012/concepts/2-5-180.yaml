data:
  definition:
  - content: |-
      Occulting light in which the occultations are combined in groups, each group including the same number of occultations, and in which the groups are repeated at regular intervals.

      The intervals of light separating the occultations within each group are of equal duration and this duration is clearly shorter than the duration of the interval of light between two successive groups. (Fig. 42b)

      ![Ch2_Fig42.jpg](/iala-vocab/images/iala/Ch2_Fig42.jpg)
