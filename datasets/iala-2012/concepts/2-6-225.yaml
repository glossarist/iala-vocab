data:
  definition:
  - content: |-
      A buoy of which the upper part of the body (above the waterline), or the larger part of the superstructure, has the shape of a cylinder or nearly so.

      ![Ch2_Fig61.jpg](/iala-vocab/images/iala/Ch2_Fig61.jpg)
  examples: []
  notes:
  - content: The German term Stumpftonne also includes buoys of truncated cone shape.
  sources:
