data:
  definition:
  - content: A transparent optically refracting element, usually of glass or plastic,
      bounded by two rotationally-symmetrical surfaces having a common axis. These
      surfaces are usually spherical, but may have other rotationally-symmetrical
      forms. A lens is designed to have a focus {{2-1-125, Optical Focus}}.
  - content: Frequently used in a more general sense for an assembly of optical elements
      which have a common focus. For examples, see 2-2-085, 2-2-090, 2-2-100, 2-2-140,    2-2-150.
