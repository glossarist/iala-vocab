data:
  definition:
  - content: A tapered metal rod enlarged at one end to form a head and with an external
      helical projection. It is intended to be driven by rotation into a material
      in which it cuts a corresponding thread.
  examples: []
  notes:
  - content: The French term vis is also used for a bolt {{7-2-340, Bolt}}.
