data:
  definition:
  - content: A frequency band, the bandwidth of which is the maximum bandwidth of
      a sound for which its threshold of audibility (in the presence of a uniform
      masking noise) and its equivalent loudness remain independent of the spectral
      distribution of sound intensity within the frequency group.
