data:
  definition:
  - content: The frequency bandwidth such that, below its lower and above its upper
      frequency limits, the mean powers radiated are each equal to 0.5% of the total
      mean power radiated by a given emission. In some cases, for example multi-channel
      frequency-division systems, the percentage of 0.5% may lead to certain difficulties
      in the practical application of the definitions of occupied and necessary bandwidth;
      in such cases a different percentage may prove useful.
