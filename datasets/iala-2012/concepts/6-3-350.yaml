data:
  definition:
  - content: A hydrocarbon fuel, C4H10, which is a gas at ordinary temperatures and
      atmospheric pressure. It has a boiling point of 1 degree C at atmospheric pressure
      and may therefore not be used in colder climates as a gaseous fuel.
  examples: []
  notes:
  - content: Butane is commercially available under various names.
  sources:
