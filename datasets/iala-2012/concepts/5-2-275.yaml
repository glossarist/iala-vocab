data:
  definition:
  - content: |-
      The time interval between the beginning of a sustained disturbance and the instant when the resulting change in the output signal (after sufficient damping) reaches and remains within a specified fraction of its final steady-state value.

      ![Ch5_Fig3.jpg](/iala-vocab/images/iala/Ch5_Fig3.jpg)

      Figure 3 - Typical time response of a system to a step increase of input.
