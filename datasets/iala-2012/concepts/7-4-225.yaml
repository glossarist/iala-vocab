data:
  definition:
  - content: The limiting value of the angle between the reaction on a plane within
      a soil mass at which shearing may occur and the normal to that plane.
  examples: []
  notes:
  - content: The tangent of the angle of internal friction is the coefficient of friction
      for the soil.
