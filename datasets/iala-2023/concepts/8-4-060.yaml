- type: expression
  designation: Ocean Data Acquisition Systems buoy
  normative_status: admitted
definition:
- content: A buoy intended for the collection of data on properties of the ocean.
    It may be moored or free-floating. It is not an aid to navigation but is classified
    as a special buoy in the IALA Maritime Buoyage System.
