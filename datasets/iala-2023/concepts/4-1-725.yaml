data:
  definition:
  - content: A method of reception in which a single output signal is derived from
      a combination of, or selection from, a plurality of transmission channels or
      paths.
  examples: []
  notes:
  - content: The methods of reception employed may include space diversity, polarization
      diversity, or frequency (channel) diversity.
