  definition:
  - content: |-
      3-1 -030

      Sound signal to warn ships in conditions of poor visibility.

      Also called Audible Signal or Sound Signal.

      Source: IALA Guideline G1090 on The Use of Audible Signals Edition 1 December 2012.
