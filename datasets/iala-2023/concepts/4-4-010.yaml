data:
  definition:
  - content: A line (geometrical locus), defined by a constant measured value, on
      which a vessel may be identified on the basis of a measurement.
  examples: []
  notes:
  - content: There are terrestrial, astronomical and radio position lines.
  - content: Also defined in 1-2-075
