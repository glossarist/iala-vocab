id: 4-2-215-eng
termid: 4-2-215
data:
  language_code: eng
terms:
- type: expression
  designation: Classification of bearings
  normative_status: preferred
definition:
- content: An arbitrary system for the grouping of bearings according to their accuracy.
    The bearings are grouped into one or other of the four following classes
- content: Class A bearings in which there is a probability of less than 1 in 20 that
    the bearing error would exceed +/-2 degrees
- content: Class B bearings in which there is a probability of less than 1 in 20 that
    the bearing error would exceed +/-5 degrees
- content: Class C bearings in which there is a probability of less than 1 in 20 that
    the bearing error would exceed +/-10 degrees
- content: Class D bearings in which the error would exceed +/-10 degrees
