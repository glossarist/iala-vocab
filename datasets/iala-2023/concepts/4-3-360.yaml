id: 4-3-360-eng
termid: 4-3-360
data:
  language_code: eng
terms:
- type: expression
  designation: Ground wave - Radar
  normative_status: preferred
definition:
- content: Ground wave (in radar) (G.B.)
- content: 1. The transference of radio frequency energy from a radar transmitter
    directly to its associated receiver, and by reflection from objects in the immediate
    vicinity of the transmitter.
- content: 2. The effect on the display of this transference of energy.
