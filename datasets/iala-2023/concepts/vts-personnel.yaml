data:
  definition:
  - content: |-
      urn:mrn:iala:dic:0901048e

      VTS personnel are persons performing tasks associated with vessel traffic services, trained in vessel traffic services operations and appropriately qualified.

      Source: IMO Resolution A.1158(32)
      IALA Guideline G1156 Recruitment, training and assessment of VTS Personnel
