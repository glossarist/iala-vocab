data:
  definition:
  - content: |-
      A cap (types F, G) which has one or more pins for fixing it in the lampholder.

      ![Ch2_Fig25.jpg](/iala-vocab/images/iala/Ch2_Fig25.jpg)
  examples: []
  notes:
  - content: For particular numbers of pins, terms such as Three-Pin Cap are employed.
  - content: In the U.S.A., a lamp having a cap with two pins is called a Bi-Post
      Lamp.
