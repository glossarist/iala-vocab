id: vessel-traffic-service-vts--eng
termid: vessel-traffic-service-vts-
data:
  language_code: eng
terms:
- type: expression
  designation: Vessel Traffic Service (VTS)
  normative_status: preferred
definition:
- content: VTS-2012-38
- content: A VTS is a service implemented by a Competent Authority, designed to improve
    the safety and efficiency of vessel traffic and to protect the environment.
- content: The service should have the capability to interact with the traffic and
    respond to traffic situations developing in the VTS Area.
- content: 'Source: IMO A.857(20)'
- content: "(VTS33/output/8 refers)"
