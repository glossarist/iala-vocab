id: 2-2-220-eng
termid: 2-2-220
data:
  language_code: eng
terms:
- type: expression
  designation: Diverged Beam
  normative_status: preferred
definition:
- content: A form of fan beam (2-1-090) produced by diverging a pencil beam (2-1-095)
    in a plane containing the axis of the beam (usually either horizontally or vertically)
    so that the angle of divergence of the diverged beam is greater than that of the
    original beam.
