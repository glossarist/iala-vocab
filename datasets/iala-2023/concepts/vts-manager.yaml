terms:
- type: expression
  designation: VTS Manager
  normative_status: preferred
definition:
- content: VTS-2012-44
- content: Some VTS organisations may require the appointment of a manager to administer
    and interface with regional or port management authorities.
- content: In such circumstances the manager should possess managerial qualifications
    to the satisfaction of the Competent Authority.
- content: "(VTS33/output/8 refers)"
