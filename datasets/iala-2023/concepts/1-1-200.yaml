data:
  definition:
  - content: Phenomenon of the change in velocity of propagation of radiation as a
      function of its frequency, which causes a separation of the monochromatic components
      of a polychromatic radiation.
  - content: Property of an optical device, or medium, giving rise to this phenomenon.
  - content: Quantity characterising this property.
