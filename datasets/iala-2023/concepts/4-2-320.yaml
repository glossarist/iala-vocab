data:
  definition:
  - content: A polarization error caused by variations in polarization generally exhibited
      during the morning and evening twilight at certain frequencies, resulting from
      the ionosphere.
  examples: []
  notes:
  - content: This term is normally deprecated and is superseded by "Polarization error"
      (4-2-325).
