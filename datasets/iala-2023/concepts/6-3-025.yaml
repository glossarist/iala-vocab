data:
  definition:
  - content: Radiant power incident from the sun upon unit area of a receptor (e.g.
      a solar cell).
  examples: []
  notes:
  - content: Solar irradiance may be direct irradiance or diffuse irradiance.
  - content: The solar irradiance depends on the geographical latitude, the season
      of the year and the time of the day, also on the intensity of solar emission
      and the transmission properties of the atmosphere, the value of air-mass and
      the inclination of the surface of the receptor.
