data:
  definition:
  - content: The total polarization error produced by a plane wave incident at an
      angle of elevation of 45 degrees  and having equal vertically and horizontally
      polarized components.
  examples: []
  notes:
  - content: As a criterion of performance the term is not appropriate to direction
      finders employing elevated antenna systems.
