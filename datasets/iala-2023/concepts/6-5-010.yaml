data:
  definition:
  - content: A conducting part that is contained in an electrochemical cell to create
      a potential difference with the electrolyte and provide the electrical connection
      between the electrolyte and an external circuit.
  examples: []
  notes:
  - content: The two different electrodes in a cell provide the e.m.f. of the cell
      across them.
  - content: The terms anode and cathode refer respectively to the positive and negative
      electrodes.
