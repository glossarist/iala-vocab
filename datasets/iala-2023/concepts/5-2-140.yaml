data:
  definition:
  - content: |-
      In a closed loop, the signal resulting from an input signal and transmitted by the loop and

      intended to be algebraically added to the input signal.

      ![Ch5_Fig2.jpg](/iala-vocab/images/iala/Ch5_Fig2.jpg)

