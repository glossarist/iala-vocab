id: 2-6-275-eng
termid: 2-6-275
data:
  language_code: eng
terms:
- type: expression
  designation: Retro-Reflecting Material
  normative_status: preferred
definition:
- content: A material which produces reflex reflection {{2-1-155, Retro-Reflection}}
    over a wide range of angles of incidence of a light beam, by the use of a large
    number of very small reflecting and refracting elements, usually very small beads.
- content: The applications are the same as those of retro-reflectors {{2-6-270, Retro-Reflector}}.
- content: "(Fig. 7d)"
