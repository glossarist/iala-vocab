id: 4-4-070-eng
termid: 4-4-070
data:
  language_code: eng
terms:
- type: expression
  designation: Loran stations
  normative_status: preferred
definition:
- content: The transmitting stations whose positions define the two foci of a family
    of hyperbolic lines of position.
- content: They are (1) a master station which initiates a continuous train of pulses
    and (2) a slave station which synchronises a continuous train of pulses with the
    pulses from the master station.
