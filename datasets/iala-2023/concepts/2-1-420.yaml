data:
  definition:
  - content: A condition of vision in which there is discomfort or a reduction in
      the ability to see significant objects, or both, due to an unsuitable distribution
      or range of luminance or to extreme contrasts in space or time.
  examples: []
  notes:
  - content: Glare may be direct or indirect and may sometimes be produced by specular
      reflection.
