id: 2-4-110-eng
termid: 2-4-110
data:
  language_code: eng
terms:
- type: expression
  designation: Occulting Hood
  normative_status: preferred
definition:
- content: "(Occulting) Hood"
- content: An opaque cover brought down over the light source in an optical apparatus
    to obscure it for a short period.
- content: Most commonly used in occulting lights and in signalling projectors.
