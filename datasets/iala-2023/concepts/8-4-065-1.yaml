id: 8-4-065-1-eng
termid: 8-4-065-1
data:
  language_code: eng
terms:
- type: expression
  designation: Buoyant beacon
  normative_status: preferred
definition:
- content: A floating mark secured to a sinker, either directly through a joint or
    by a cable that is held in tension by the buoyancy of the mark. The buoyancy chamber
    is normally below the surface of the sea.
- content: 'Note 1:'
- content: The terms resilient beacon and elastic beacon have been used with this
    meaning, but their continued use is not recommended.
- content: 'Note 2:'
- content: When the connection to the sinker is by a universal joint and the aid carries
    a light, the term articulated light is sometimes used. This usage is deprecated.
- content: 'Note 3:'
- content: This term was changed to Articulated beacon in October 2012. EEP Report
    (section AOB) refers.
sources:
