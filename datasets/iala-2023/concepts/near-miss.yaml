id: near-miss-eng
termid: near-miss
data:
  language_code: eng
terms:
- type: expression
  designation: Near Miss
  normative_status: preferred
definition:
- content: VTS-2012-22
- content: A sequence of events and/or conditions that could have resulted in loss.
    This loss was prevented only by a fortuitous break in the chain of events and/or
    conditions.
- content: The potential loss could be human injury, environmental damage or negative
    business impact (e.g., repair or replacement costs, scheduling delays, contract
    violations, loss of reputation).
- content: 'Source: IMO MSC-MEPC.7/Circ.7'
- content: "(VTS33/output/8 refers)"
