  designation: Audible Signal
  normative_status: preferred
definition:
- content: An audible signal intended to warn or guide ships in low visibility.
- content: Also called Fog Signal or Sound Signal.
- content: 'Source: IALA Guideline G1090 on The Use of Audible Signals Edition 1 December
    2012.'
