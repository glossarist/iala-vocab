data:
  definition:
  - content: |-
      A light which appears continuous and steady and of constant colour to an observer whose position remains unchanged in relation to it. (Fig. 40a)

      (Compare "Fixed mark", 2-6-005).
  examples: []
  notes:
  - content: In Britain and U.S.A., the term "Fixed light" is also loosely used for
      a light sup-ported on a fixed structure, as distinct from a light on a floating
      support.
