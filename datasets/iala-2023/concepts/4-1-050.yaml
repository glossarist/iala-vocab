data:
  definition:
  - content: The maximum permissible departure by the centre frequency of the frequency
      band occupied by an emission from the assigned frequency, or by the characteristic
      frequency of an emission from the reference frequency. The frequency tolerance
      is expressed in parts in 106 or in hertz.
