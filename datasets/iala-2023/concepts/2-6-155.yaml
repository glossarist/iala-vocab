id: 2-6-155-eng
termid: 2-6-155
data:
  language_code: eng
terms:
- type: expression
  designation: Daylight Signal Light
  normative_status: preferred
definition:
- content: A signal light exhibited by day and also, usually with reduced intensity,
    by night.
- content: This reduction of intensity is made in order to avoid glare.
- content: Daylight signals indicate, for example, whether the entrance to a lock
    is free or not.
