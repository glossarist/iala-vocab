data:
  definition:
  - content: |-
      The nominal daytime range for maritime applications at which the field strength expressed in microvoltter metre reaches the value laid down for the particular region in which the radio beacon is operating.

      When two values are given, thus 100/70 miles, the first is the range by day, the second is by night.

      Region 1

      50 microvolts per metre for radio beacons North of 43 degrees N.
      75 microvolts per metre for radio beacons between 43 degrees N and 30 degrees N.
      100 microvolts per metre for radio beacons between 30 degrees N and 30 degrees S.
      75 microvolts per metre for radio beacons between 30 degrees S and 43 degrees S.
      50 microvolts per metre for radio beacons South of 43 degrees S.

      Region 2

      50 microvolts per metre for radio beacons North of 40 degrees N.
      75 microvolts per metre for radio beacons between 40 degrees N and 31 degrees N.
      100 microvolts per metre for radio beacons between 31 degrees N and 30 degrees S.
      75 microvolts per metre for radio beacons between 30 degrees S and 43 degrees S.
      50 microvolts per metre for radio beacons South of 43 degrees S.

      Region 3

      75 microvolts per metre for radio beacons North of 40 degrees N.
      100 microvolts per metre for radio beacons between 40 degrees N and 50 degrees S.
      75 microvolts per metre for radio beacons South of 50 degrees S.
  examples: []
  notes:
  - content: 'The values as laid down by the Reference: I.T.U. Regulations are'
