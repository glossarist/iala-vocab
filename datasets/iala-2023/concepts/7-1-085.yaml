data:
  definition:
  - content: A structure extending into the sea from a beach or bank, designed to
      prevent littoral drift.
  examples: []
  notes:
  - content: The French term epi and the German term Buhne are also used for structures
      extending into rivers or estuaries, designed to restrict the cross-sectional
      area of the water flow.
  sources:
