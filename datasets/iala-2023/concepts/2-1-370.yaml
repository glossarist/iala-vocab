data:
  definition:
  - content: |-
      Point Vision (of a light source);

      A special mode of vision which takes place when the threshold of illuminance {{2-1-390, Threshold of Illuminance}} at the eye of an observer is independent of the angular subtense of the light source.
  examples: []
  notes:
  - content: For a background luminance of less than about 0.1 candela per square
      metre, point vision takes place when the light source has an apparent angular
      diameter not more than about one minute of arc. For higher values of background
      luminance, point vision can also take place if the angular diameter of the light
      source is accordingly smaller.
  sources:
  - origin:
      ref:
        source: IALA Dictionary
    type: authoritative
