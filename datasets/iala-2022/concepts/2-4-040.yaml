data:
  definition:
  - content: |-
      Small rotating bodies in the form of balls, wheels, cylinders or truncated cones, used to assist movement by reducing friction.

      ![Ch2_Fig10.jpg](/iala-vocab/images/iala/Ch2_Fig10.jpg)
  examples: []
  notes:
  - content: In lighthouse service, rollers are mainly used to assist and guide the
      movement of a rotating optic.
  - content: In Germany, no general term equivalent to "rollers" exists, but particular
      terms are used when the rollers are in the form of balls (Kugellager), wheels
      (Walzenlager), cylinders (Zylinderlager) or truncated cones (Kegellager).
  sources:
