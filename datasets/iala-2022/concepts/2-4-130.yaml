data:
  definition:
  - content: An opaque screen covering part of a lantern, or placed outside the lantern,
      so as to provide a sharp cut-off to a beam in a sector light and to reduce the
      angle of uncertainty.
  examples: []
  notes:
  - content: This is a particular form of "cut screen".
