data:
  definition:
  - content: |-
      Alternative terms: GRP, Glassfibre, Fiberglass (USA)

      Material formed by the use of woven or chopped strand mats of glass fibres impregnated with a synthetic resin hardened to form a rigid material, by chemical or heat treatment.
