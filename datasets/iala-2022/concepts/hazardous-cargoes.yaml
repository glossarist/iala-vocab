data:
  definition:
  - content: |-
      VTS-2012-15

      Hazardous Cargoes include:

      Goods classified in the International Maritime Dangerous Goods (IMDG) Code;
      Substances classified in Chapter 17 of the IMO International Code for Construction and Equipment of Ships Carrying Dangerous Chemicals in Bulk (IBC) Code, and in Chapter 19 of the IMO International Code for the Construction and Equipment of Ships Carrying Liquefied Gases in Bulk (IGC) Code;
      Oils as defined in MARPOL Annex I;
      Noxious liquid substances as defined in MARPOL Annex II;
      Harmful substances as defined in MARPOL Annex III; and
      Radioactive materials specified in the Code for the Safe Carriage of Irradiated Nuclear Fuel, Plutonium and High Level Radioactive Wastes in Flasks on Board Ships (INF)
      Cargoes specified in Part B of the International Maritime Solid Bulk Cargoes Code (IMSBC)

      Source: IMO A.857(20) and IMSBC

      (VTS33/output/8 refers)
