data:
  definition:
  - content: |-
      The mechanism which rotates the optic or revolving screen in a flashing or occulting light.

      ![Ch2_Fig10.jpg](/iala-vocab/images/iala/Ch2_Fig10.jpg)
  examples: []
  notes:
  - content: The terms Lens Clock and, in French, Machine de Rotation a Poids refer
      to such a mechanism when driven by a falling weight.
