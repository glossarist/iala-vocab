data:
  definition:
  - content: A converter that provides one or more voltages or currents, each of which
      is maintained within specific limits.
  examples: []
  notes:
  - content: The French term alimentation regulee refers to a stabilised power supply
      unit in which the stabilisation of voltage is made by feedback.
