data:
  definition:
  - content: |-
      Inert granular material, either processed from rock, occurring naturally, such as gravel or sand, or manufactured, such as furnace slag.

      Aggregate is mixed with cement and water in suitable proportions to make concrete.
  examples: []
  notes:
  - content: A distinction is made between coarse aggregate retained on a 5 mm test
      sieve and fine aggregate which is passed by such a sieve.
  - content: In French and German a distinction is also made between different aggregates
      according to whether they are of natural origin or produced by crushing, e.g.
      in French between pierre roulee and pierre cassee and between sable de riviere
      and sable de concassage, and similarly in German between ungebrochenes Korn
      and gebrochenes Korn, between Grobkies and Schotter, between Kies and Splitt
      (all coarse aggregates), and between Sand and Brechsand (fine aggregates).
  sources:
