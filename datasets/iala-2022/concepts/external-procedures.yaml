data:
  definition:
  - content: |-
      VTS-2012-14

      Procedures that govern the interaction with participating vessels and allied services (defined as services actively involved in the safe and efficient passage of the vessel through the VTS area).

      Source: IALA Recommendation V-127 (2004)

