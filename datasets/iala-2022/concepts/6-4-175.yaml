data:
  definition:
  - content: A power system that ensures that there is no harmful fluctuation in the
      electric supply to equipment, in the event of any failure in the regular supply.
  examples: []
  notes:
  - content: Maintenance of the supply following an important failure may require
      subsequent change-over to an emergency supply; the no-break power system eliminates
      harmful fluctuations during change-over.
