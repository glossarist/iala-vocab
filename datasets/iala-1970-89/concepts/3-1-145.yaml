id: 3-1-145-eng
termid: 3-1-145
data:
  language_code: eng
terms:
- type: expression
  designation: Directivity factor
  normative_status: preferred
- type: expression
  designation: Directivity factor (of a sound source)
  normative_status: admitted
definition:
- content: The ratio of the square of the radiated free field sound pressure at a
    fixed point on the principal axis to the mean square pressure averaged over the
    surface of a sphere passing through the fixed point and concentric with the source.
