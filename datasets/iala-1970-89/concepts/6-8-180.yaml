id: 6-8-180-eng
termid: 6-8-180
data:
  language_code: eng
terms:
- type: expression
  designation: Phase meter
  normative_status: preferred
- type: expression
  designation: Phase-angle meter
  normative_status: admitted
definition:
- content: An instrument that measures the difference of phase between two alternating
    electric quantities of the same frequency.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The term power-factor meter refers to a phase meter for which the quantities
    are the voltage and current at a point of a circuit and in which the indication
    is of power factor.
