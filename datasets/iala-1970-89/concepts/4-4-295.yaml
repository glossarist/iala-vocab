id: 4-4-295-eng
termid: 4-4-295
data:
  language_code: eng
terms:
- type: expression
  designation: Raydist Lane resolution
  normative_status: preferred
definition:
- content: Lane resolution (in Raydist)
- content: A system used in Type M and Type N Raydist. Additional stations are set
    up near the shore stations.
- content: The resultant hyperbolic co-ordinates are much further apart, at a distance
    from the baseline, and therefore provide a coarse scale for resolution of the
    fine system scale.
