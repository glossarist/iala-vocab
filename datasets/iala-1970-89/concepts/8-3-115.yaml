id: 8-3-115-eng
termid: 8-3-115
data:
  language_code: eng
  terms:
  - type: expression
    designation: Windlass
    normative_status: preferred
  definition:
  - content: A special form of winch, fitted with clutched cable lifters for lifting
      and lowering the anchor. Drums or barrels may be fitted on the ends of the shafts,
      to permit handling of lines, for example for warping of the vessel alongside
      a quay.
