id: 4-4-270-eng
termid: 4-4-270
data:
  language_code: eng
terms:
- type: expression
  designation: Raydist
  normative_status: preferred
definition:
- content: A continuous wave phase comparison system which is used principally for
    precision locating of a vessel in survey operations. Radio frequency operation
    is generally between 1.7 and 5 MHz.
- content: The several Raydist system configurations have a general principle of operation
    in common.
- content: Two stations are used, each emitting a radio frequency, the separation
    between the frequencies being narrow. These are received at several locations.
- content: The audio frequencies, produced by heterodyning the two radio frequencies
    at each station, are brought to a common location where they are phase compared
    automatically and continuously in special meters.
- content: Because the heterodyne changes in the same way at each receiver in the
    event of changes of frequency or phase in either of the radio frequencies, synchronisation
    between the transmitters is not required. (See also Lorac 4-4-380).
