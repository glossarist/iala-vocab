id: 4-1-560-eng
termid: 4-1-560
data:
  language_code: eng
terms:
- type: expression
  designation: Parabolic antenna
  normative_status: preferred
definition:
- content: An antenna comprising a reflector whose shape is that of a paraboloid of
    revolution or a parabolic cylinder, and a feed usually situated approximately
    at the focus of the reflector (if of the first type) or on the focal line of the
    reflector (if of the second type).
