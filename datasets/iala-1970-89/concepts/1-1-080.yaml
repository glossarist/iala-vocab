id: 1-1-080-eng
termid: 1-1-080
data:
  language_code: eng
  terms:
  - type: expression
    designation: Stand-by apparatus
    normative_status: preferred
  definition:
  - content: Permanently available apparatus specially designed to be brought easily
      into service if the normal equipment fails. It may often be brought into service
      automatically. It usually provides an adequate replacement for the normal service
      equipment.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
