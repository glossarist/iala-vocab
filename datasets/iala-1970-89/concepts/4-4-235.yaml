terms:
- type: expression
  designation: Electrical centre
  normative_status: preferred
definition:
- content: Electrical centre (of a ship)
- content: The reference point on the vessel which is determined for each individual
    navigational system.
- content: It is used to measure distance and is determined by calibration at a known
    range on a number of different headings.
