id: 1-1-120-eng
termid: 1-1-120
data:
  language_code: eng
terms:
- type: expression
  designation: Radiant energy
  normative_status: preferred
definition:
- content: Energy emitted, transferred or received as radiation.
- content: Symbol Qe
- content: Unit joule (J)
- content: 1 J = 1 watt-second (W.s)
- content: 1 J = 107erg
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
  modification: modified from source
notes:
- content: This quantity may be expressed in terms of the radiant flux (Fe) and the
    time of radiation (dt) by Qe = ?Fe .dt
