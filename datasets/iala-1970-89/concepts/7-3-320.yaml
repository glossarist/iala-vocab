id: 7-3-320-eng
termid: 7-3-320
data:
  language_code: eng
terms:
- type: expression
  designation: Glass-reinforced plastic
  normative_status: preferred
definition:
- content: 'Alternative terms: GRP, Glassfibre, Fiberglass (USA)'
- content: Material formed by the use of woven or chopped strand mats of glass fibres
    impregnated with a synthetic resin hardened to form a rigid material, by chemical
    or heat treatment.
