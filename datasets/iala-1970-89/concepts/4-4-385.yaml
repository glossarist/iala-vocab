id: 4-4-385-eng
termid: 4-4-385
data:
  language_code: eng
terms:
- type: expression
  designation: Satellite navigation
  normative_status: preferred
definition:
- content: A navigational aid which utilises man-made satellites as points of reference.
- content: Navigation by satellite would be characterised by world-wide coverage,
    high accuracy and independence of weather conditions.
- content: Satellite systems require surface-based facilities for monitoring and controlling
    their performance.
