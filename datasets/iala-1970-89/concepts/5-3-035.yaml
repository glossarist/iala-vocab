  terms:
  - type: expression
    designation: Phase modulation (PM)
    normative_status: preferred
  definition:
  - content: Angle modulation in which the instantaneous phase angle of a sine-wave
      carrier is caused to depart from the carrier angle by an amount proportional
      to the instantaneous amplitude of the modulating wave.
