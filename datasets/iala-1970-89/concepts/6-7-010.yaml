id: 6-7-010-eng
termid: 6-7-010
data:
  language_code: eng
terms:
- type: expression
  designation: Converter
  normative_status: preferred
definition:
- content: A device for the conversion of electric energy.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The device may convert alternating current into alternating current, direct
    current into direct current, direct current into alternating current, alternating
    current into direct current, or alternating current into unidirectional current.
