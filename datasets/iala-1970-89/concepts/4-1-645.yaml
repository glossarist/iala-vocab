data:
  language_code: eng
terms:
- type: expression
  designation: R.F. stage
  normative_status: preferred
definition:
- content: R.F. stage (of a radio transmitter)
- content: 1. That part of a radio transmitter in which the radio frequency signals
    are amplified.
- content: 2. This term is usually used to refer to the output stage of a transmitter.
