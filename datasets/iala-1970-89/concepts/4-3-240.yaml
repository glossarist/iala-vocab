id: 4-3-240-eng
termid: 4-3-240
data:
  language_code: eng
terms:
- type: expression
  designation: Phantom target
  normative_status: preferred
definition:
- content: An indication of an object on a display that does not correspond to the
    presence of an actual object at the point indicated.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: I.C.A.O
notes:
- content: This term is also used for "Echo box" in U.S.A. {{4-3-170, Echo box}}.
