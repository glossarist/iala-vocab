id: 6-3-265-eng
termid: 6-3-265
data:
  language_code: eng
  terms:
  - type: expression
    designation: Oscillating water column
    normative_status: preferred
  definition:
  - content: |-
      Acronym: OWC

      A form of wave-actuated generator that can be used on buoys, consisting of an inverted tube open to the sea at its base, within which the water column can oscillate and act as a piston forcing air through overhead valves into a low-pressure air turbine.
