  designation: Decca Lane slip
  normative_status: preferred
definition:
- content: Lane slip (in Decca)
- content: A fault due to temporary loss of signal, etc., whereby the Decometer, while
    reading correctly on its fraction pointer, reads incorrectly on its lane pointer.
