id: 6-3-120-eng
termid: 6-3-120
data:
  language_code: eng
terms:
- type: expression
  designation: Turbulence
  normative_status: preferred
definition:
- content: Disorderly air flow produced by obstructions (buildings, trees, etc) in
    the path of wind, or by the increase in friction when winds pass over the coast
    from sea to land.
