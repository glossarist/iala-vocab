id: 4-3-485-eng
termid: 4-3-485
data:
  language_code: eng
terms:
- type: expression
  designation: Ring around
  normative_status: preferred
definition:
- content: Ring around (in secondary radar)
- content: 1. The undesired triggering of a transponder by its own transmitter.
- content: 2. The triggering of a transponder at all bearings causing a ring presentation
    on a P.P.I.
