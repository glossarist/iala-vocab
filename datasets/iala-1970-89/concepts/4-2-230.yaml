id: 4-2-230-eng
termid: 4-2-230
data:
  language_code: eng
terms:
- type: expression
  designation: Error in bearing
  normative_status: preferred
definition:
- content: The angular difference, expressed algebraically, between the observed bearing
    and the corresponding true bearing.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: This error is in general the sum of two terms, an installation error that
    can be corrected and an unknown random error.
