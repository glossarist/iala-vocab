id: 1-2-015-eng
termid: 1-2-015
data:
  language_code: eng
  terms:
  - type: expression
    designation: Pilotage
    normative_status: preferred
  - type: expression
    designation: Pilotage service
    normative_status: admitted
  definition:
  - content: The provision of a service of specially qualified men possessing detailed
      local knowledge, who assist the masters of vessels to navigate them in particular
      areas.
  notes:
  - content: In Britain and the U.S.A. the word "pilotage" is also loosely used for
      piloting.
