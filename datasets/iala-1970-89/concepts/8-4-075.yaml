id: 8-4-075-spa
termid: 8-4-075
data:
  language_code: spa
terms:
- type: expression
  designation: Superstructure (of a buoy)/es
  normative_status: preferred
definition:
- content: Superestructura (de una boya)
- content: |-
    Armazón o construcción considerable que se realiza sobre el cuerpo de una boya. Puede servir como marca diurna y puede llevar una señal luminosa, marca de tope y otras ayudas a la navegación.
    .
- content: 'Nota 1:'
- content: El término jaula se refiere a una parte de una superestructura que es un
    marco externo de listones o costillas muy separadas. El propósito de una jaula
    es proporcionar una forma característica como un cilindro, cono o esfera.
- content: 'Nota 2:'
- content: Los términos soporte de linterna y poste de linterna (EE. UU.) Se refieren
    a la parte de la superestructura de la boya que proporciona soporte directo a
    la luz de la boya y, posiblemente, también al topmark y al reflector de radar.
- content: El término francés support de lanterne tiene el mismo significado.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
