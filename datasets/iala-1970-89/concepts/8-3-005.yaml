data:
  language_code: eng
terms:
- type: expression
  designation: Rigging
  normative_status: preferred
definition:
- content: General term covering masts, yards, booms and gaffs and all ropes, chains
    and gear used for operating these.
- content: 'Note :'
- content: 'There are two types of rigging : standing rigging and running rigging.'
