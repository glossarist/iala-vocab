id: 4-2-370-eng
termid: 4-2-370
data:
  language_code: eng
terms:
- type: expression
  designation: Adcock antenna
  normative_status: preferred
definition:
- content: An antenna consisting of a pair of horizontally spaced vertical elements
    connected, or coupled, differentially to a single output circuit and designed
    to minimise the response to the horizontally polarized electric component of the
    field, the response pattern having the shape of a figure of eight.
