id: 4-2-160-eng
termid: 4-2-160
data:
  language_code: eng
terms:
- type: expression
  designation: Radiogoniometer
  normative_status: preferred
definition:
- content: An instrument which, when coupled to a suitable fixed antenna system, enables
    the bearing of incident waves to be determined by rotation of a movable part.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
