  - type: expression
    designation: Fundamental frequency (of a periodic quantity)
    normative_status: admitted
  definition:
  - content: In general, the lowest frequency obtained by a frequency analysis of
      the wave form of the periodic quantity. It is the frequency of a sinusoidal
      quantity having the same period.
