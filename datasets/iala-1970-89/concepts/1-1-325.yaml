id: 1-1-325-eng
termid: 1-1-325
data:
  language_code: eng
terms:
- type: expression
  designation: Fundamental frequency
  normative_status: preferred
definition:
- content: Fundamental frequency (of a periodic quantity)
- content: In general, the lowest frequency obtained by a frequency analysis of the
    wave form of the periodic quantity. It is the frequency of a sinusoidal quantity
    having the same period.
