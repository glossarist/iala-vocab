id: 2-1-090-eng
termid: 2-1-090
data:
  language_code: eng
terms:
- type: expression
  designation: Luminous fan beam
  normative_status: preferred
definition:
- content: "(Luminous) Fan Beam"
- content: A beam in which the light is concentrated in and about a single plane,
    usually horizontal.
- content: The angular spread in the plane of concentration may cover either 360 degrees
    or a smaller angle.
