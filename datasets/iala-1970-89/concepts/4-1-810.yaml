id: 4-1-810-eng
termid: 4-1-810
data:
  language_code: eng
terms:
- type: expression
  designation: Square law detector
  normative_status: preferred
definition:
- content: A detector which demodulates small signals and whose output voltage is
    substantially proportional to the square of the voltage of the modulated input
    wave.
