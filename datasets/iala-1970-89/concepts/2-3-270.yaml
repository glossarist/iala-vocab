id: 2-3-270-eng
termid: 2-3-270
data:
  language_code: eng
  terms:
  - type: expression
    designation: Simmering Current
    normative_status: preferred
  definition:
  - content: Low current maintained in an electric lamp (of incandescence or discharge
      type) when not required to emit light, usually in order to reduce the time taken
      to reach full light output after the normal supply current is fed to the lamp.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
