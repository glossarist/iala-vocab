id: 5-2-285-eng
termid: 5-2-285
data:
  language_code: eng
terms:
- type: expression
  designation: Control action
  normative_status: preferred
definition:
- content: Of a control element or a controlling system, the nature of the change
    of the output effected by the input.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: ": The output may be a signal or the value of a manipulated variable. The
    input may be the control-loop feedback signal when the command is constant, an
    actuating signal, or the output of another control element. One use of control
    action is to effect compensation."
