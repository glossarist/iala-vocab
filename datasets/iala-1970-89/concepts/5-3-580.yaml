  designation: Computer Programme (G.B.)
  normative_status: preferred
definition:
- content: "(Computer) Programme (G.B.)"
- content: A set of instructions in the proper form to cause a computer to perform
    any desired computation
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: When the computation is a repetitive task, e.g., sine(x), it is called
    a routine.
