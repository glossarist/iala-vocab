id: 4-3-175-eng
termid: 4-3-175
data:
  language_code: eng
  terms:
  - type: expression
    designation: Ring time
    normative_status: preferred
  definition:
  - content: The time, reckoned from the end of a pulse transmitted by a radar set,
      during which the energy being returned by an echo box remains above that value
      required to produce a visible signal on the display.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: I.R.E
