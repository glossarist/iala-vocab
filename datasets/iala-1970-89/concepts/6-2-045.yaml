id: 6-2-045-eng
termid: 6-2-045
data:
  language_code: eng
terms:
- type: expression
  designation: Two-stroke engine
  normative_status: preferred
definition:
- content: An internal combustion engine in which the working cycle is completed in
    two strokes of the piston (i.e. in one revolution of the crankshaft).
- content: "- fuel injection, combustion and the beginning of exhaustion in diesel
    engines"
- content: "- explosion and exhaustion in petrol engines"
- content: "- intake of air and compression in diesel engines"
- content: "- admission of mixture and compression in petrol engines"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The downstroke of the piston corresponds to
- content: The upstroke of the piston corresponds to
