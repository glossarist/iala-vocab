id: 4-1-325-eng
termid: 4-1-325
data:
  language_code: eng
terms:
- type: expression
  designation: Scattering
  normative_status: preferred
definition:
- content: Scattering (in radio wave propagation)
- content: 1. In the most general sense, the process by which the propagation of electromagnetic
    waves is modified by lack of homogeneity in the medium.
- content: 2. More usually the process by which the propagation of electromagnetic
    waves is modified by one or more discontinuities in the medium of limited extent
    compared with the wavelength.
