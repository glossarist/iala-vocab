id: access-manhole-eng
termid: access-manhole
data:
  language_code: eng
terms:
- type: expression
  designation: Access manhole
  normative_status: preferred
definition:
- content: 8-4-125(
- content: An opening, for example in a buoy body, to permit personnel to enter the
    interior for occasional inspections or repairs.  It is closed by means of a firmly-secured
    watertight cover.
- content: On vessels and on Lanbys, a large access manhole is called a deck hatch.
