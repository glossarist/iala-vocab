id: 4-1-720-eng
termid: 4-1-720
data:
  language_code: eng
terms:
- type: expression
  designation: Image frequency
  normative_status: preferred
definition:
- content: Second-channel frequency
- content: In heterodyne reception, a frequency, other than that to which the receiver
    is tuned, which    is such that the difference between this frequency and that
    of a local oscillator in the receiver is a frequency lying within the pass band
    of an intermediate-frequency amplifier in the receiver, in which it produces an
    unwanted response.
