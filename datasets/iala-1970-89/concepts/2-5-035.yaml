id: 2-5-035-eng
termid: 2-5-035
data:
  language_code: eng
terms:
- type: expression
  designation: Remotely Controlled Light
  normative_status: preferred
definition:
- content: A light which is operated by personnel at a considerable distance from
    the light, through the intermediary of electrical or radio links or both.
