id: 2-2-210-eng
termid: 2-2-210
data:
  language_code: eng
terms:
- type: expression
  designation: Diverting Prism
  normative_status: preferred
definition:
- content: A transparent optical element of prismatic section, having plane or curved
    faces, placed in the path of light from an optic, to produce a converged, diverged
    or diverted beam.
- content: "(Figs. 17 and 18)"
