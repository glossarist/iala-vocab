    designation: Hour meter
    normative_status: preferred
  - type: expression
    designation: Run-hour meter, elapsed-time meter
    normative_status: admitted
  definition:
  - content: An instrument that indicates the time during which a device or machine
      has been in operation.
  notes:
  - content: If the device is used with a rotary machine, the term running-hours recorder
      is also used.
