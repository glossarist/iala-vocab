id: 8-1-030-eng
termid: 8-1-030
data:
  language_code: eng
terms:
- type: expression
  designation: Work barge
  normative_status: preferred
definition:
- content: 'A boat used for :'
- content: carrying out repairs and maintenance to fixed aids to navigation
- content: handling smaller buoys
- content: relief of personnel and fuelling and provisioning of lighthouses and light
    vessels.
- content: 'Note :'
- content: No special term exists for this in German, but the general term Seezeichenfahrzeug
    includes work barges used by the lighthouse services (See note to 8-1-000).
sources:
- type: authoritative
