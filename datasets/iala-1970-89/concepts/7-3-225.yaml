  designation: Concrete
  normative_status: preferred
definition:
- content: A mixture of cement, aggregate, sand and water which hardens to a solid
    material with a high crushing strength.
- content: The proportions of cement, aggregate, sand and water may be adjusted to
    impart specific properties to the concrete.
