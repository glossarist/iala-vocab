id: 2-2-025-eng
termid: 2-2-025
data:
  language_code: eng
terms:
- type: expression
  designation: Ring
  normative_status: preferred
definition:
- content: A transparent optical element, usually of glass or plastic, in the form
    of an annulus or annular segment, having a prismatic section in sense 2 of 2-2-020.
    There are both dioptric {{2-2-060, Dioptric}} and catadioptric {{2-2-070, Catadioptric}}
    rings, usually forming part of an optical panel or a drum lens.
- content: "(Figs. 10 and 16)"
