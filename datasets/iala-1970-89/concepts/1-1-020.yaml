id: 1-1-020-eng
termid: 1-1-020
data:
  language_code: eng
terms:
- type: expression
  designation: Aid to navigation station
  normative_status: preferred
- type: expression
  designation: Aid to Navigation establishment
  normative_status: admitted
definition:
- content: All buildings and apparatus belonging to an Aid to Navigation and its operation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: An aid to navigation station including an important light is usually called
    in Britain and the U.S.A. a light-station, and in France a phare. There are also
    fog-signal stations and light- and fog-signal stations.
