id: 4-1-880-eng
termid: 4-1-880
data:
  language_code: eng
terms:
- type: expression
  designation: Refraction (2)
  normative_status: preferred
definition:
- content: Change in the direction of propagation of a radiation, determined by the
    change in the velocity of propagation in passing through a non-homogeneous medium,
    or in passing from one medium to another.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
  modification: modified from source
notes:
- content: This phenomenon appears only when the angle of incidence is different from
    90 degrees .
