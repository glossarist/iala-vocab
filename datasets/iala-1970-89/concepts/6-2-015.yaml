  normative_status: preferred
- type: expression
  designation: Compression-ignition engine
  normative_status: admitted
definition:
- content: An internal combustion engine in which air admitted into the cylinder is
    sufficiently high in temperature after compression to ignite the fuel subsequently
    injected into the combustion chamber.
