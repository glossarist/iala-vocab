id: 1-1-145-eng
termid: 1-1-145
data:
  language_code: eng
terms:
- type: expression
  designation: Radiant exposure
  normative_status: preferred
definition:
- content: Radiant exposure (at a point of a surface)
- content: The product of an irradiance (Ee) and its duration (dt).
- content: Symbol He He = ?Ee.dt
- content: Unit joule per square metre (J/m2)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
  modification: modified from source
notes:
- content: Equivalent definition Surface density of the radiant energy received.
- content: Formerly irradiation in English and irradiation in French.
- content: For further definitions see C.I.E.
