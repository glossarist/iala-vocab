id: 6-3-155-eng
termid: 6-3-155
data:
  language_code: eng
  terms:
  - type: expression
    designation: Variable-pitch blade
    normative_status: preferred
  definition:
  - content: A blade for which the blade pitch can be varied within limits while the
      rotor is turning, in order to control the speed of the rotor.
  notes:
  - content: This action is called blade pitch control.
  sources:
  - type: authoritative
    origin:
