id: 2-1-125-eng
termid: 2-1-125
data:
  language_code: eng
terms:
- type: expression
  designation: Optical Focus
  normative_status: preferred
definition:
- content: "(Optical) Focus"
- content: The point on the axis of an optical system such that rays parallel to the
    axis and incident on the system converge to this point or appear to emanate from
    this point after refraction or reflection by the system.
- content: "(Figs. 12, 13, 14, 15, 17 and 19)"
