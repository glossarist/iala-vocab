id: 8-4-050-eng
termid: 8-4-050
data:
  language_code: eng
terms:
- type: expression
  designation: Winter buoy
  normative_status: preferred
definition:
- content: A buoy, often unlighted, used as a replacement for a light buoy or a large
    unlighted buoy in certain areas during the winter months when other aids to navigation
    are temporarily withdrawn.
- content: 'Note 1:'
- content: The term ice buoy is used when the buoy is designed to withstand the effects
    ofice.
- content: 'Note 2:'
- content: In German, the term Winterbetonnung means the state of the buoyage system
    as modified during the winter months.
- content: 'Note 3:'
- content: The French term "bouee d'hiver" is not much used in France.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
