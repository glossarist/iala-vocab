id: 8-4-050-spa
termid: 8-4-050
data:
  language_code: spa
terms:
- type: expression
  designation: Winter buoy/es
  normative_status: preferred
definition:
- content: Boya de invierno
- content: Boya en general ciega utilizada como sustitución de una boya luminosa o
    una boya ciega grande  en ciertas áreas durante los meses de invierno cuando se
    retiran temporalmente otras ayudas  a  la navegación.
- content: 'Nota 1:'
- content: El término boya de hielo se usa cuando la boya está diseñada para resistir
    los efectos del hielo.
- content: 'Nota 2:'
- content: En alemán, el término Winterbetonnung significa el estado del sistema de
    flotación modificado durante los meses de invierno.
- content: 'Nota 3:'
- content: El término francés "bouee d'hiver" no se usa mucho en Francia.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
