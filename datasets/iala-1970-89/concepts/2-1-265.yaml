terms:
- type: expression
  designation: Allard's Law
  normative_status: preferred
definition:
- content: A formula relating the illuminance produced on a normal surface at a given
    distance from a point source of light, the intensity of the light and the degree
    of transparency of the atmosphere (assumed uniform).
- content: The law may be expressed as follows
- content: "![Allard1.gif](/iala-vocab/images/iala/Allard1.gif)"
- content: where E is the resulting illuminance on this surface
- content: I is the intensity of the incident light in the direction of measurement.
- content: T is the atmospheric transmission factor (assumed uniform) for the specified
- content: x is the distance of the surface from the light source, measured in the
    specified units of distance.
- content: "![Allard2.gif](/iala-vocab/images/iala/Allard2.gif)"
- content: where V = meteorological visibility (2-1-280 and 2-1-290, Note:).
