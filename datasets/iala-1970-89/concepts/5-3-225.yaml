id: 5-3-225-eng
termid: 5-3-225
data:
  language_code: eng
terms:
- type: expression
  designation: Peak envelope power (2)
  normative_status: preferred
definition:
- content: The average power supplied to the antenna transmission line by a transmitter
    during one radio frequency cycle at the highest crest of the modulation envelope
    taken under conditions of normal operation.
