id: 6-2-040-eng
termid: 6-2-040
data:
  language_code: eng
terms:
- type: expression
  designation: Four-stroke engine
  normative_status: preferred
definition:
- content: An internal combustion engine in which the working cycle is completed in
    four strokes of the piston (i.e. in two revolutions of the crankshaft).
- content: 1. Induction of the working fluid
- content: |-
    air in diesel engines
    fuel or fuel-air mixture in petrol engines
- content: 2. Compression of the working fluid
- content: 3. Fuel injection and combustion in diesel engines
- content: fuel ignition and expansion of the ignited fluid in petrol engines, this
    stroke is the power stroke
- content: 4. Exhaustion of the waste gases
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The four strokes correspond to
