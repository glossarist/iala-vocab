terms:
- type: expression
  designation: Hinged
  normative_status: preferred
definition:
- content: 'Alternative terms: Pinned, Articulated'
- content: The description of a structural member which has been secured in such a
    way as to permit some rotational movement, sufficient to eliminate all bending
    moment in the member at the joint.
