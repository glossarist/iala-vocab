id: 4-2-195-eng
termid: 4-2-195
data:
  language_code: eng
terms:
- type: expression
  designation: Pick-up factor
  normative_status: preferred
definition:
- content: For a specified antenna or combination of antennas connected to a receiver
    of a direction finder, the ratio of the receiver input voltage to the field strength
    of the received wave, taking into account input impedance, and any variable component
    between the antenna and the receiver, the direction and polarization of the wave
    being specified.
