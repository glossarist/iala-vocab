id: 6-2-265-eng
termid: 6-2-265
data:
  language_code: eng
terms:
- type: expression
  designation: Pressure-relief valve
  normative_status: preferred
- type: expression
  designation: Safety valve
  normative_status: admitted
definition:
- content: A device that allows air (or other gas) under pressure to escape to the
    atmosphere, when the pressure exceeds a given value. The device is controlled
    by either a spring or a weight.
