  designation: Wind-power generator
  normative_status: preferred
definition:
- content: 'Alternative terms: Wind-driven generator, Wind-turbine generator, Aerogenerator'
- content: A rotary electric generator for which the motive power is the wind. The
    axis of rotation may be horizontal or vertical.
