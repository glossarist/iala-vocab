id: 2-2-195-eng
termid: 2-2-195
data:
  language_code: eng
terms:
- type: expression
  designation: Filter
  normative_status: preferred
definition:
- content: A device which is used to modify, by transmission, the radiant or luminous
    flux, or the spectral distribution, or both, of the radiation passing through
    it.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
  modification: modified from source
notes:
- content: A distinction is made between Selective Filters and Non-Selective Filters
    according as they do or do not alter the relative spectral distribution of the
    radiation.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Filter
