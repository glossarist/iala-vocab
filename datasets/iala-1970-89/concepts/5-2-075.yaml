id: 5-2-075-eng
termid: 5-2-075
data:
  language_code: eng
terms:
- type: expression
  designation: Closed loop control system
  normative_status: preferred
definition:
- content: A control system in which the objective is that the controlled quantity
    attain a desired performance and be then measured and compared with a standard
    representing that performance.
- content: that it will reduce the deviation of the controlled quantity from the standard.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: I.E.E.E
  modification: modified from source
notes:
- content: ": Any deviation from the standard is fed back into the control system
    in such a sense"
