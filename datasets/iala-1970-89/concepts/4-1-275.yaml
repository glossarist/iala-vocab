id: 4-1-275-eng
termid: 4-1-275
data:
  language_code: eng
terms:
- type: expression
  designation: Radiation field
  normative_status: preferred
definition:
- content: The part of the field of an antenna which is associated with an average
    outward flow of energy.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
  modification: modified from source
notes:
- content: In the absence of absorption the field varies in this region inversely
    as the distance from the antenna.
