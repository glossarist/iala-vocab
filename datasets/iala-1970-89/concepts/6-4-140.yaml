id: 6-4-140-eng
termid: 6-4-140
data:
  language_code: eng
terms:
- type: expression
  designation: Protected machine
  normative_status: preferred
definition:
- content: A machine designed so that the ingress of solid foreign bodies of specified
    sizes and the harmful ingress of water are restricted or prevented.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The different categories for protection of machines are specified in IEC
    34-5. For further details of these, See Section 8.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Protected_machine
