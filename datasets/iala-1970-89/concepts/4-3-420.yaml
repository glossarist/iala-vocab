data:
  language_code: eng
terms:
- type: expression
  designation: Transponder
  normative_status: preferred
- type: expression
  designation: Transponder beacon
  normative_status: admitted
definition:
- content: A component of a secondary radar system which receives pulses from a radar
    set or interrogator, and, in response to the received pulse, transmits a pulse
    or sequence of pulses to enable the craft or beacon incorporating the transponder
    to be identified by the interrogating station.
