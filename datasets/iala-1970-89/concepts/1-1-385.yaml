id: 1-1-385-eng
termid: 1-1-385
data:
  language_code: eng
terms:
- type: expression
  designation: Recorder
  normative_status: preferred
definition:
- content: The part of the recording equipment that places the information in the
    store.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In German the term Speicher is also used for the recorded material (record).
- content: In French a recorder for sound signals is called a magnetophone and a recorder
    for visual signals is called a magnetoscope.
