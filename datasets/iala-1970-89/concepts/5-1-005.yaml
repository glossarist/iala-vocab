id: 5-1-005-eng
termid: 5-1-005
data:
  language_code: eng
  terms:
  - type: expression
    designation: Fail safe
    normative_status: preferred
  definition:
  - content: In a remotely or automatically controlled system, that characteristic
      which, if any component or subsystem fails, ensures that the system will continue
      to provide the required service but without the remote or automatic control.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
