terms:
- type: expression
  designation: Loudness
  normative_status: preferred
definition:
- content: The attribute of intensity of an auditory sensation in terms of which sounds
    may be ordered on a scale extending from soft to loud.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The unit of loudness is the Sone.
