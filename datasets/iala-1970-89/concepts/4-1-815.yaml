id: 4-1-815-eng
termid: 4-1-815
data:
  language_code: eng
terms:
- type: expression
  designation: Cross modulation
  normative_status: preferred
definition:
- content: Cross modulation (in a receiver)
- content: The modulation of a wanted signal by an unwanted signal on a different
    coexistent carrier frequency, arising from the interaction of the radio-frequency
    signals in non-linear circuits of the receiver preceding the detector.
