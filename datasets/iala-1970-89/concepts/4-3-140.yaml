data:
  language_code: eng
  terms:
  - type: expression
    designation: Azimuth-stabilised P.P.I.
    normative_status: preferred
  definition:
  - content: A plan-position indicator in which the true north on the display remains
      fixed in spite of the movement of the ship.
  notes:
  - content: The term is extended to stabilisation with respect to magnetic north.
