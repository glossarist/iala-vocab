id: 4-4-125-eng
termid: 4-4-125
data:
  language_code: eng
terms:
- type: expression
  designation: Electronic position indicator
  normative_status: preferred
definition:
- content: Electronic position indicator (E.P.I.)
- content: A version of Loran in which the length of the base line is measured thus
    providing range information.
- content: In practice the master station is placed on the survey vessel and two or
    more slave stations are temporarily set up ashore.
