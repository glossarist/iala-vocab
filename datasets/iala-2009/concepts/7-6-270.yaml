data:
  definition:
  - content: The action of pulling an object through the water by means of a rope.
  examples: []
  notes:
  - content: In French and in German a distinction is made between remorquage, Schleppen
      for towing by a vessel and halage, Treideln for towing by a land-based vehicle.
