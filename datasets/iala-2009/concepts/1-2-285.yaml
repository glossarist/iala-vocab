data:
  definition:
  - content: Platform attached to the land to permit passage of passengers and freight
      traffic to and from a ship. In some cases the outer end of the landing stage
      is floating on a pontoon.
  examples: []
  notes:
  - content: In German the term Anleger is also used for a landing stage.
