data:
  definition:
  - content: A device which, in a rhythmic light, interrupts the supply of energy
      (in the form of fuel or electric current) to a light source, according to the
      character of the light.
  examples: []
  notes:
  - content: A flasher is a form of coder.
  sources:
  - origin:
      ref:
        source: IALA Dictionary
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: Flasher
