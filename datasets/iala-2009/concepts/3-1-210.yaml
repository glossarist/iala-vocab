data:
  definition:
  - content: The process by which the threshold of audibility for one sound is raised
      by the presence of another (masking) sound.
  - content: The amount by which the threshold of audibility of a sound is raised
      by the presence of another (masking) sound. The unit customarily used is the
      decibel.
