data:
  definition:
  - content: A device used to alter the spatial distribution of a luminous flux and
      depending essentially on the phenomenon of diffusion.
  examples: []
  notes:
  - content: If all the radiation reflected or transmitted by the diffuser is diffused,
      it is said to be Completely Diffusing.
