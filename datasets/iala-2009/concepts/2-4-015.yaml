data:
  definition:
  - content: |-
      1. Bars used to support the glazing and the roof of a lantern.

      ![Ch2_Fig33.jpg](/iala-vocab/images/iala/Ch2_Fig33.jpg)

      2. In the U.S.A., loosely used for bars supporting the optical elements of a prismatic lens or of a fixed lens. (Fig. 16b)

      ![Ch2_Fig16b.jpg](/iala-vocab/images/iala/Ch2_Fig16b.jpg)
  examples: []
  notes:
  - content: In Britain, the term is used in sense 2 only in respect of a fixed lens.
  - content: The German term Verstrebungen is also used for bars supporting the optical
      elements of a prismatic lens or of a fixed lens.
