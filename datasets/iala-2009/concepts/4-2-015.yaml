data:
  definition:
  - content: |-
      Radio beacon schedule Sequence number

      A term used in parts of the world where radio beacons are operated in groups. It indicates the position (or positions) in the group occupied by the transmissions of the radio beacon and is designated by the numbers) of the minute(s) in which transmission occurs.
