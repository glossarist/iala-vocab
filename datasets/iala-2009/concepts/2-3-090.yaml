data:
  definition:
  - content: |-
      Filamento

      Conductor similar a un hilo, generalmente de tungsteno (o de carbono), que se calienta hasta la incandescencia por el paso de una corriente eléctrica.

      ![Ch2_Fig22.jpg](/iala-vocab/images/iala/Ch2_Fig22.jpg)

      Referencia: C.I.E.
