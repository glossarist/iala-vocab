data:
  definition:
  - content: The minimum r.m.s. sound pressure level of a pure sound which excites
      the sensation of hearing under specified conditions and at a specified frequency.
  examples: []
  notes:
  - content: 'The term "Threshold of hearing" is also used to deNote: the level of
      the least r.m.s. value of the sound pressure of a complex sound which excites
      the sensation of hearing.'
  - content: This threshold is usually determined under conditions of negligible ambient
      noise, but may be determined under other specified conditions.
  sources:
