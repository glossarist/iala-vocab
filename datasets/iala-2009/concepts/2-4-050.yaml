data:
  definition:
  - content: An optical device used for focusing {{2-2-155, Focusing}}, for example,
      a short telescope with cross-wire, fixed to the frame of the optic.
  examples: []
  notes:
  - content: In France and Germany, the type of focusing device mainly used projects,
      by means of lenses and prisms, an image of the luminous element of the light
      source on a screen fitted with a cross-wire and usually also with concentric
      rings.
  sources:
