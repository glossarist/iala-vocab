data:
  definition:
  - content: The voltage across an unloaded (open) photovoltaic device at a particular
      temperature and irradiance.
  examples: []
  notes:
  - content: For unregulated systems, the open-circuit voltage may be greatly in excess
      of the nominal voltage.
