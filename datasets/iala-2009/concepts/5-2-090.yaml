data:
  definition:
  - content: A system in which the manipulated variable assumes discrete predetermined
      values.
  examples: []
  notes:
  - content: 'Note:: The condition for change from one predetermined value to another
      is often a function of the value of the actuating signal. When the number of
      values of the manipulated variable is two it is called a two-step control system,
      when more than two, a multi-step control system.'
