data:
  definition:
  - content: |-
      A wave which can be resolved into two plane polarized waves which are perpendicular to each other and propagate in the same direction.
      The amplitudes of the waves are equal and in time-phase quadrature.
      The tip of the component of the electric field vector in the plane normal to the direction of propagation describes a circle.
