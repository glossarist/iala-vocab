data:
  definition:
  - content: |-
      A lamp in which light is produced by means of a body heated to incandescence by the passage of an electric current. (Figs. 10 and 22)

      ![Ch2_Fig10.jpg](/iala-vocab/images/iala/Ch2_Fig10.jpg)

      ![Ch2_Fig22.jpg](/iala-vocab/images/iala/Ch2_Fig22.jpg)
  examples: []
  notes:
  - content: According as the luminous element is a filament of carbon or metal, the
      lamp is called a Carbon Filament Lamp or a Metal Filament Lamp. The latter may
      be a Straight-Filament Lamp {{2-3-175, Straight-Filament Lamp}}, a Single-Coil
      Lamp {{2-3-180, Single-Coil Lamp}} or a Coiled-Coil Lamp {{2-3-185, Coiled-Coil
      Lamp}}.
