data:
  definition:
  - content: In pulse systems, a method of providing information by modifying the
      signal (at its source) so that the signal presentation on the display alternately
      appears and disappears or shifts along the time base, e.g. in Loran, a means
      for indicating that a transmitting station is not operating correctly.
