data:
  definition:
  - content: The part of the earth's outer atmosphere where free electrons, arising
      from ionization, are normally present in quantities sufficient to modify the
      propagation characteristics of radio waves traversing it.
  examples: []
  notes:
  - content: For purposes of reference, the ionosphere is divided into three regions
      whose boundaries are approximately spherical and concentric with the surface
      of the earth.
