data:
  definition:
  - content: The power supplied to the antenna transmission line by a transmitter
      during normal operation, averaged over a time sufficiently long compared with
      the period of the lowest frequency encountered in the modulation. A time of
      1/10 second during which the mean power is greatest will be selected normally.
