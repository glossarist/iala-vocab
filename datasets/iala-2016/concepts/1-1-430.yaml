data:
  definition:
  - content: A disc (forming part of a coder) on which a character is defined. This
      is transmitted by mechanical or other means to another apparatus (e.g. a light,
      radio emitter or sound signal).
  examples: []
  notes:
  - content: When the character is transmitted mechanically by action of a toothed
      or recessed disc on a lever, the term cam (properly applicable to the teeth)
      is sometimes used loosely for the code wheel.
  sources:
  - origin:
      ref:
        source: IALA Dictionary
    type: authoritative
