data:
  definition:
  - content: A feedback control system in which one or more of the system signals
      represent mechanical motion.
  examples: []
  notes:
  - content: 'Note:: It should be noted that servomechanism and feedback regulator
      are not mutually exclusive terms. Their application to a particular system will
      depend upon the method of operation of that system.'
