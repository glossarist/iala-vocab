data:
  definition:
  - content: The upper part of a system used to place concrete underwater without
      segregation.
  examples: []
  notes:
  - content: The lowest part of the hopper connects to a tremie pipe or spout leading
      beneath the water to the desired location. The complete system is called a tremie.
