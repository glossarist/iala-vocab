data:
  definition:
  - content: |-
      Area of special architectural or historic interest, the character or appearance of which it is desirable to preserve or enhance.

      (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
