data:
  definition:
  - content: The part rotated by the wind to produce power, and comprising the blades
      and the hub or hubs to which they are attached.
  examples: []
  notes:
  - content: The term propellor (abbreviated as prop) is sometimes used for a rotor
      in which a few blades are radially disposed about a hub and for which the normal
      axis of rotation is horizontal, or nearly so.
