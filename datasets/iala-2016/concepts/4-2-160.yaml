data:
  definition:
  - content: An instrument which, when coupled to a suitable fixed antenna system,
      enables the bearing of incident waves to be determined by rotation of a movable
      part.
  examples: []
  notes:
  - content: Two types of radiogoniometer are used, either capacitive or inductive.
