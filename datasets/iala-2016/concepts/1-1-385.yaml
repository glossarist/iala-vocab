data:
  definition:
  - content: The part of the recording equipment that places the information in the
      store.
  examples: []
  notes:
  - content: In German the term Speicher is also used for the recorded material (record).
  - content: In French a recorder for sound signals is called a magnetophone and a
      recorder for visual signals is called a magnetoscope.
