data:
  definition:
  - content: |-
      The simultaneous occurrence of specular reflection and of diffuse reflection. (Fig. 7c)

      ![Ch2_Fig7.jpg](/iala-vocab/images/iala/Ch2_Fig7.jpg)
  examples: []
  notes:
  - content: The illuminance received from a point source after specular reflection
      varies inversely as the square of the distance between the source and the point
      at which the illuminance is produced. That received after diffuse reflection
      varies inversely as the square of the distance to the diffuser.
