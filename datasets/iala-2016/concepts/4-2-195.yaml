data:
  definition:
  - content: For a specified antenna or combination of antennas connected to a receiver
      of a direction finder, the ratio of the receiver input voltage to the field
      strength of the received wave, taking into account input impedance, and any
      variable component between the antenna and the receiver, the direction and polarization
      of the wave being specified.
