data:
  definition:
  - content: All buildings and apparatus belonging to an Aid to Navigation and its
      operation.
  examples: []
  notes:
  - content: An aid to navigation station including an important light is usually
      called in Britain and the U.S.A. a light-station, and in France a phare. There
      are also fog-signal stations and light- and fog-signal stations.
