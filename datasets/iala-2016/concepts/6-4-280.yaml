data:
  definition:
  - content: A single-phase induction motor provided with an auxiliary primary winding
      that is displaced in magnetic position from, and connected in parallel with,
      the main primary winding. There is a phase difference between the currents in
      these two windings.
  examples: []
  notes:
  - content: The auxiliary primary winding is designed to assist the starting of the
      motor and is commonly taken out of circuit during normal running conditions.
  sources:
