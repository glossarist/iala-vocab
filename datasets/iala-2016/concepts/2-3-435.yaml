data:
  definition:
  - content: A discharge lamp, operated with electronic equipment, giving a high light
      output for a very brief period, capable of repetition.
  examples: []
  notes:
  - content: In lighthouse service, this type of lamp has been used for example for
      quick-flashing lights and in fog-detection apparatus.
