data:
  definition:
  - content: A frequency having a fixed and specified position with respect to the
      assigned frequency. The displacement of this frequency, with respect to the
      assigned frequency, has the same absolute value and sign that the displacement
      of the characteristic frequency has with respect to the centre of the frequency
      band occupied by the emission.
