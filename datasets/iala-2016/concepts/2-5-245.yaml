data:
  definition:
  - content: |-
      Two or more lights positioned to form a leading / range / transit line to be followed.

      A leading line defined by two such leading lights is called the axis of the lights. (Fig.47)

      ![Ch2_Fig47.jpg](/iala-vocab/images/iala/Ch2_Fig47.jpg)
  examples: []
  notes:
  - content: In Britain, the axis of the lights is often called the Line of Lights.
      In German it is called Richtfeuerlinie.
  sources:
