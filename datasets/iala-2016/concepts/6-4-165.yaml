data:
  definition:
  - content: A generator set that is permanently available and intended to be brought
      easily into service when another supply has failed.
  examples: []
  notes:
  - content: An emergency generator set that is brought into service when the regular
      supply has failed and that provides comparable service is called a standby generator
      set.
  - content: An emergency generator set that is brought into service when both regular
      supply and emergency supply have failed may provide a greatly reduced service.
