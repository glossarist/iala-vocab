data:
  definition:
  - content: A generator that produces electric energy from the motion of the tidal
      current.
  examples: []
  notes:
  - content: Such generators may be actuated by the pressure of a head of water built
      up behind a barrage, or by direct conversion of the energy of tidal flow. In
      the latter case, the term tidal stream rotor is also used.
  sources:
