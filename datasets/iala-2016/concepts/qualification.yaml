data:
  definition:
  - content: |-
      urn:mrn:iala:dic:0901026e

      Qualification is the education, knowledge, understanding, proficiency, skill, experience or any other attribute which the competent authority and/or the VTS provider has determined desirable for performing the duties of the relevant position. VTS qualifications should be based on the principle that satisfactory results are obtained on completion of the IALA VTS model courses.

      Source: IALA Guideline G1156 Recruitment, training and assessment of VTS Personnel
