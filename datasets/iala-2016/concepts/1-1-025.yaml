data:
  definition:
  - content: Station established with a semaphore and from which the passage of ships
      can be observed and from which it is possible to communicate with them.
  examples: []
  notes:
  - content: In Britain a station of similar type but without a semaphore is called
      a coastguard station (not to be confused with the term {{1-1-030, Coast guard
      station}}).
